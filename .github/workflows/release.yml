name: Release

# Cuts a GitHub Release with cross-compiled CLI binaries when a version tag is
# pushed, e.g. `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish CLI binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist build
          # Pure-Go CLI (gui_stub.go path) cross-compiles cleanly without CGO.
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${t%/*}"; arch="${t#*/}"
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            echo "==> building ${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath \
                -ldflags "-s -w -X godisplacementx/internal/cli.Version=${VERSION#v}" \
                -o "build/godisplacementx-cli${ext}" .
            base="godisplacementx-cli_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              (cd build && zip -q "../dist/${base}.zip" "godisplacementx-cli${ext}")
            else
              tar -C build -czf "dist/${base}.tar.gz" "godisplacementx-cli${ext}"
            fi
            rm -f "build/godisplacementx-cli${ext}"
          done
          (cd dist && sha256sum * > SHA256SUMS.txt)
          ls -l dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
