name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Build and test the default (pure-Go CLI) path; the Wails GUI lives behind
      # the `desktop` build tag and needs platform webview deps, so it is not
      # exercised here.
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -count=1
      - name: Test (race + coverage)
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
